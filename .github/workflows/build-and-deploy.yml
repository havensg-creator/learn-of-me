name: Build and Deploy to Netlify

on:
  push:
    branches: [main]
  # Netlify build hooks trigger via the Netlify side, but this
  # workflow can also be triggered manually or on push.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: npx eleventy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/
